name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  links:
    name: Check links and assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --accept 200,206,429
            --exclude "^https://github\\.com"
            --exclude "^https://twitter\\.com"
            --exclude "^https://x\\.com"
            --exclude "^https://linkedin\\.com"
            --exclude "^https://www\\.linkedin\\.com"
            --exclude "^mailto:"
            --exclude "^https://aibuilderday\\.com"
            --exclude "^https://justbuild\\.ing"
            --root-dir ${{ github.workspace }}
            index.html sponsors.html keynote.html
          fail: true
